<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.title }}</title>
    <meta name="description" content="{{ config.description }}">
    
    <!-- Open Graph -->
    <meta property="og:site_name" content="{{ config.title }}">
    <meta property="og:title" content="{{ config.title }}">
    <meta property="og:description" content="{{ config.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ config.base_url }}">

    <link rel="canonical" href="{{ config.base_url }}/">
    {% if config.extra.accent_color %}<meta name="theme-color" content="{{ config.extra.accent_color }}">{% endif %}

    <link rel="icon" type="image/svg+xml" href="{{ get_url(path='favicon.svg') }}">
    <link rel="alternate icon" href="{{ get_url(path='favicon.svg') }}">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
